# /etc/wireguard/wg0.conf  —  company-site gateway (Rocky Linux 9)
#
# Reachable DIRECTLY on its Floating IP (203.0.113.10). It dials the idc-site
# peer through the FortiGate VIP that fronts the idc gateway.
#
# Placeholders only. Generate real keys with:
#   wg genkey | tee privatekey | wg pubkey > publickey
# Replace <...> values. NEVER commit a real PrivateKey.

[Interface]
Address    = 10.0.90.1/30
ListenPort = 51820
PrivateKey = <COMPANY_SITE_PRIVATE_KEY>

# Use iptables (NOT nft) — wg-quick eval breaks on nft '{ }' syntax.
# Match on source subnet, not -i (POSTROUTING has no input interface).
# Masquerade traffic arriving FROM the remote (idc) subnet out onto the local
# LAN (eth0), so local hosts reply to this gateway without needing a route back.
PostUp = iptables -t nat -A POSTROUTING -s 10.0.90.0/30 -o eth0 -j MASQUERADE; \
         iptables -t nat -A POSTROUTING -s 10.20.0.0/24 -o eth0 -j MASQUERADE
PreDown = iptables -t nat -D POSTROUTING -s 10.0.90.0/30 -o eth0 -j MASQUERADE; \
          iptables -t nat -D POSTROUTING -s 10.20.0.0/24 -o eth0 -j MASQUERADE

[Peer]
# idc-site gateway, reached via the FortiGate VIP (DNAT -> idc Floating IP)
PublicKey  = <IDC_SITE_PUBLIC_KEY>
Endpoint   = 198.51.100.1:51820
AllowedIPs = 10.0.90.2/32, 10.20.0.0/24
PersistentKeepalive = 25
