# /etc/wireguard/wg0.conf  —  idc-site gateway (Ubuntu 24.04)
#
# Sits BEHIND a FortiGate. Inbound UDP/51820 reaches it via the FortiGate VIP
# (198.51.100.1 -> DNAT -> 203.0.113.20). It dials the company-site peer directly
# on the company Floating IP.
#
# Placeholders only. Generate real keys with:
#   wg genkey | tee privatekey | wg pubkey > publickey
# Replace <...> values. NEVER commit a real PrivateKey.

[Interface]
Address    = 10.0.90.2/30
ListenPort = 51820
PrivateKey = <IDC_SITE_PRIVATE_KEY>

# Ubuntu ships the iptables CLI. WAN interface on cloud images is typically ens3.
# Masquerade traffic arriving FROM the remote (company) subnet out onto the local
# LAN (ens3), so local hosts reply to this gateway without needing a route back.
PostUp = iptables -t nat -A POSTROUTING -s 10.0.90.0/30 -o ens3 -j MASQUERADE; \
         iptables -t nat -A POSTROUTING -s 10.10.0.0/24 -o ens3 -j MASQUERADE
PreDown = iptables -t nat -D POSTROUTING -s 10.0.90.0/30 -o ens3 -j MASQUERADE; \
          iptables -t nat -D POSTROUTING -s 10.10.0.0/24 -o ens3 -j MASQUERADE

[Peer]
# company-site gateway, reachable directly on its Floating IP
PublicKey  = <COMPANY_SITE_PUBLIC_KEY>
Endpoint   = 203.0.113.10:51820
AllowedIPs = 10.0.90.1/32, 10.10.0.0/24
PersistentKeepalive = 25
