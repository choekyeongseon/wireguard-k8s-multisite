# /etc/sysctl.d/99-wireguard.conf  —  apply on each gateway VM
#
#   sudo cp 99-wireguard.conf /etc/sysctl.d/ && sudo sysctl --system

# Required: forward packets between the site NIC and wg0.
net.ipv4.ip_forward = 1

# Loose reverse-path filtering. Strict mode (1) drops the asymmetrically-routed
# packets that arrive on wg0 but whose source would route out another interface.
net.ipv4.conf.all.rp_filter = 2
